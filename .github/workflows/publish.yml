name: Publish Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.npm-publish.outputs.published || 'false' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: corepack enable

      - run: corepack prepare pnpm@9.15.9 --activate

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          "$HOME/.moon/bin/moon" version --all

      - run: pnpm install --frozen-lockfile

      - run: pnpm check:moonbit-version

      - run: pnpm test

      - run: pnpm build

      - name: Package MoonBit module
        run: moon -C packages/agent-finder package

      - name: Create release pull request
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          title: "chore: version packages"
          commit: "chore: version packages"
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        id: npm-publish
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          pnpm release
          echo "published=true" >> "$GITHUB_OUTPUT"

  publish-moonbit:
    needs: publish
    if: ${{ needs.publish.outputs.published == 'true' }}
    uses: ./.github/workflows/moonbit-publish.yml
    secrets: inherit
