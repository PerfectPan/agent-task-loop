<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ATL</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #141210;
    --bg-raised: #1b1916;
    --bg-soft: #221f1b;
    --line: rgba(232, 220, 200, 0.09);
    --line-strong: rgba(232, 220, 200, 0.16);
    --ink: #f2ebe0;
    --ink-dim: #a89f91;
    --ink-faint: #6e675d;
    --copper: #c9854a;
    --copper-soft: rgba(201, 133, 74, 0.14);
    --copper-line: rgba(201, 133, 74, 0.35);
    --ok: #8fbc8f;
    --warn: #d4a574;
    --bad: #c97b7b;
    --serif: "Source Serif 4", "Songti SC", Georgia, serif;
    --sans: "DM Sans", "PingFang SC", "Helvetica Neue", sans-serif;
    --mono: "IBM Plex Mono", "SF Mono", ui-monospace, monospace;
    --shadow: 0 0 0 1px rgba(0,0,0,0.35), 0 18px 40px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background:
      radial-gradient(1200px 600px at 10% -20%, rgba(201,133,74,0.07), transparent 50%),
      radial-gradient(800px 500px at 100% 0%, rgba(143,188,143,0.04), transparent 45%),
      var(--bg);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: "";
    pointer-events: none;
    position: fixed; inset: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    z-index: 1000;
  }
  button, input, select, textarea { font: inherit; color: inherit; }
  button { cursor: pointer; border: 0; background: none; }
  a { color: var(--copper); }

  .shell {
    height: 100%;
    display: grid;
    grid-template-rows: 56px 1fr;
  }

  /* —— Top bar —— */
  .bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 18px;
    border-bottom: 1px solid var(--line);
    background: rgba(20, 18, 16, 0.88);
    backdrop-filter: blur(14px);
  }
  .mark {
    display: flex;
    align-items: baseline;
    gap: 10px;
    min-width: 160px;
  }
  .mark .sig {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--ink);
  }
  .mark .sig i {
    font-style: normal;
    color: var(--copper);
  }
  .mark .ver {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .search {
    flex: 1;
    max-width: 380px;
    position: relative;
  }
  .search input {
    width: 100%;
    height: 34px;
    border-radius: 2px;
    border: 1px solid var(--line-strong);
    background: var(--bg-raised);
    padding: 0 12px 0 32px;
    font-size: 13px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .search input::placeholder { color: var(--ink-faint); }
  .search input:focus {
    border-color: var(--copper-line);
    box-shadow: 0 0 0 3px var(--copper-soft);
  }
  .search::before {
    content: "/";
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-faint);
  }
  .bar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chip {
    height: 28px;
    padding: 0 10px;
    border-radius: 2px;
    border: 1px solid var(--line-strong);
    background: transparent;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.02em;
  }
  .chip.on, .chip:hover { color: var(--ink); border-color: var(--copper-line); }
  .btn {
    height: 32px;
    padding: 0 14px;
    border-radius: 2px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background .12s, color .12s, border-color .12s;
  }
  .btn-solid {
    background: var(--copper);
    color: #1a120a;
  }
  .btn-solid:hover { filter: brightness(1.06); }
  .btn-solid:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
  .btn-line {
    border: 1px solid var(--line-strong);
    color: var(--ink-dim);
    background: transparent;
  }
  .btn-line:hover { color: var(--ink); border-color: var(--ink-faint); }
  .pulse {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding-left: 4px;
  }
  .pulse i {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ok);
  }
  .pulse.down i { background: var(--bad); }

  /* —— Body —— */
  .body {
    min-height: 0;
    display: grid;
    grid-template-columns: 200px minmax(0, 1fr) 360px;
  }
  .rail, .stage, .inspector {
    min-height: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--line);
  }
  .inspector { border-right: 0; }

  .rail {
    background: rgba(27, 25, 22, 0.6);
    padding: 16px 12px;
    gap: 18px;
    overflow: auto;
  }
  .rail-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding: 0 8px 8px;
  }
  .rail-item {
    width: 100%;
    text-align: left;
    padding: 8px 10px;
    border-radius: 2px;
    font-size: 13px;
    color: var(--ink-dim);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }
  .rail-item:hover { background: rgba(255,255,255,0.03); color: var(--ink); }
  .rail-item.on {
    background: var(--copper-soft);
    color: var(--ink);
    box-shadow: inset 2px 0 0 var(--copper);
  }
  .rail-item em {
    font-style: normal;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
  }
  .bind {
    margin-top: auto;
    border-top: 1px solid var(--line);
    padding-top: 14px;
  }
  .bind-card {
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--bg-raised);
  }
  .bind-card .k {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .bind-card .v {
    font-size: 12px;
    line-height: 1.45;
    color: var(--ink-dim);
  }
  .bind-card .v strong {
    display: block;
    color: var(--ink);
    font-weight: 600;
    margin-bottom: 2px;
  }

  /* —— Stage (list) —— */
  .stage-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    padding: 18px 20px 12px;
    border-bottom: 1px solid var(--line);
  }
  .stage-head h1 {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }
  .stage-head .meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
  }
  .filters {
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--line);
  }
  .filters select {
    height: 30px;
    border-radius: 2px;
    border: 1px solid var(--line-strong);
    background: var(--bg-raised);
    padding: 0 10px;
    font-size: 12px;
    color: var(--ink-dim);
    outline: none;
  }
  .list {
    flex: 1;
    overflow: auto;
    padding: 8px 12px 20px;
  }
  .row {
    width: 100%;
    text-align: left;
    display: grid;
    grid-template-columns: 108px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 12px 10px;
    border-bottom: 1px solid var(--line);
    border-radius: 0;
    transition: background .12s;
  }
  .row:hover { background: rgba(255,255,255,0.02); }
  .row.on {
    background: linear-gradient(90deg, var(--copper-soft), transparent 70%);
    box-shadow: inset 2px 0 0 var(--copper);
  }
  .row .id {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--copper);
    letter-spacing: 0.02em;
  }
  .row .body .t {
    font-size: 13.5px;
    font-weight: 560;
    letter-spacing: -0.01em;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row .body .s {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
  }
  .st {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 8px;
    border: 1px solid var(--line-strong);
    border-radius: 2px;
    color: var(--ink-dim);
    white-space: nowrap;
  }
  .st.run { color: var(--ok); border-color: rgba(143,188,143,0.35); }
  .st.fail { color: var(--bad); border-color: rgba(201,123,123,0.35); }
  .st.done { color: var(--ok); opacity: 0.85; }
  .st.wait { color: var(--warn); border-color: rgba(212,165,116,0.35); }

  /* —— Inspector —— */
  .inspector {
    background: rgba(27, 25, 22, 0.45);
  }
  .insp-scroll {
    flex: 1;
    overflow: auto;
    padding: 20px 18px 24px;
  }
  .empty {
    height: 100%;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 32px;
    color: var(--ink-faint);
  }
  .empty .glyph {
    font-family: var(--serif);
    font-size: 40px;
    color: var(--line-strong);
    margin-bottom: 12px;
    line-height: 1;
  }
  .empty strong {
    display: block;
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 600;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }
  .hero-id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--copper);
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }
  .hero-title {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.2;
    margin-bottom: 14px;
  }
  .hero-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
  }
  .acts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .section {
    border-top: 1px solid var(--line);
    padding: 14px 0;
  }
  .section h4 {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .section p {
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-dim);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .kv {
    display: grid;
    grid-template-columns: 76px 1fr;
    gap: 8px 12px;
    font-size: 12px;
  }
  .kv dt {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
  }
  .kv dd { color: var(--ink-dim); overflow-wrap: anywhere; }

  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--line);
    margin: 0 0 12px;
  }
  .tabs button {
    flex: 1;
    padding: 8px 6px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    border-bottom: 2px solid transparent;
  }
  .tabs button.on {
    color: var(--ink);
    border-bottom-color: var(--copper);
  }
  .rounds { display: flex; flex-direction: column; gap: 4px; }
  .round {
    width: 100%;
    text-align: left;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--bg);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 10px;
  }
  .round:hover { border-color: var(--line-strong); }
  .round.on {
    border-color: var(--copper-line);
    background: var(--copper-soft);
  }
  .round .rk {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--copper);
  }
  .round .rm {
    font-size: 11px;
    color: var(--ink-faint);
    font-family: var(--mono);
  }
  .round .rt {
    grid-column: 1 / -1;
    font-size: 12px;
    color: var(--ink-dim);
  }
  .dot-yes { color: var(--ok); }
  .dot-no { color: var(--ink-faint); }
  .msgs { display: flex; flex-direction: column; gap: 8px; max-height: 420px; overflow: auto; }
  .msg-row {
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 10px 12px;
    background: var(--bg);
  }
  .msg-row.user {
    border-color: var(--copper-line);
    background: rgba(201,133,74,0.08);
  }
  .msg-row.assistant {
    border-color: var(--line-strong);
  }
  .msg-row.tool {
    padding: 6px 10px;
    opacity: 0.85;
  }
  .msg-row .mr {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .msg-row.user .mr { color: var(--copper); }
  .msg-row.assistant .mr { color: var(--ok); }
  .msg-row.tool .mr { color: var(--warn); }
  .msg-row .mt {
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink-dim);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-row.tool .mt {
    font-family: var(--mono);
    font-size: 11px;
  }
  .logbox {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.45;
    color: var(--ink-dim);
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 10px;
    max-height: 360px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* —— Chat drawer —— */
  .chat-fab {
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 30;
    height: 40px;
    padding: 0 16px;
    border-radius: 2px;
    background: var(--bg-soft);
    border: 1px solid var(--line-strong);
    color: var(--ink);
    font-size: 12px;
    font-weight: 600;
    box-shadow: var(--shadow);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .chat-fab:hover { border-color: var(--copper-line); }
  .chat-fab .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink-faint);
  }
  .chat-fab .dot.model { background: var(--ok); }
  .drawer-mask {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .drawer-mask.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(400px, 100%);
    z-index: 50;
    background: var(--bg-raised);
    border-left: 1px solid var(--line-strong);
    box-shadow: var(--shadow);
    transform: translateX(104%);
    transition: transform .22s cubic-bezier(.2,.8,.2,1);
    display: flex;
    flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-h {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--line);
  }
  .drawer-h h2 {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
  }
  .drawer-h .sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .log {
    flex: 1;
    overflow: auto;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .bubble {
    max-width: 92%;
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    border-radius: 2px;
  }
  .bubble.user {
    align-self: flex-end;
    background: var(--copper-soft);
    border: 1px solid var(--copper-line);
    color: var(--ink);
  }
  .bubble.bot {
    align-self: flex-start;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    color: var(--ink-dim);
  }
  .bubble .who {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 5px;
  }
  .tools { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .tool {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 6px;
    border: 1px solid var(--line-strong);
    color: var(--ink-faint);
  }
  .tool.ok { color: var(--ok); border-color: rgba(143,188,143,0.35); }
  .tool.bad { color: var(--bad); border-color: rgba(201,123,123,0.35); }
  .compose {
    border-top: 1px solid var(--line);
    padding: 12px;
    display: grid;
    gap: 8px;
  }
  .compose textarea {
    width: 100%;
    min-height: 72px;
    max-height: 140px;
    resize: vertical;
    border: 1px solid var(--line-strong);
    background: var(--bg);
    border-radius: 2px;
    padding: 10px;
    outline: none;
    font-size: 13px;
    line-height: 1.45;
  }
  .compose textarea:focus {
    border-color: var(--copper-line);
    box-shadow: 0 0 0 3px var(--copper-soft);
  }
  .compose-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
  }
  .suggest { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 10px; }
  .suggest button {
    font-size: 11px;
    padding: 5px 9px;
    border: 1px solid var(--line-strong);
    color: var(--ink-dim);
    border-radius: 2px;
  }
  .suggest button:hover { border-color: var(--copper-line); color: var(--ink); }

  /* modal */
  .modal-root {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    place-items: center;
    z-index: 60;
    padding: 20px;
  }
  .modal-root.open { display: grid; }
  .modal {
    width: min(480px, 100%);
    background: var(--bg-raised);
    border: 1px solid var(--line-strong);
    border-radius: 2px;
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .modal h3 {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 14px;
    letter-spacing: -0.02em;
  }
  .form { display: grid; gap: 12px; }
  .form label {
    display: grid;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .form input, .form select, .form textarea {
    height: 36px;
    border: 1px solid var(--line-strong);
    background: var(--bg);
    border-radius: 2px;
    padding: 0 10px;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink);
    outline: none;
    text-transform: none;
    letter-spacing: 0;
  }
  .form textarea { height: auto; padding: 10px; }
  .form input:focus, .form select:focus, .form textarea:focus {
    border-color: var(--copper-line);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
  .toast {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
    z-index: 70; display: flex; flex-direction: column; gap: 8px; align-items: center;
  }
  .toast-item {
    background: var(--bg-soft);
    border: 1px solid var(--line-strong);
    color: var(--ink);
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 560;
    border-radius: 2px;
    box-shadow: var(--shadow);
  }
  @media (max-width: 1100px) {
    .body { grid-template-columns: 180px 1fr; }
    .inspector { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div class="shell">
  <header class="bar">
    <div class="mark">
      <div class="sig">atl<i>.</i>console</div>
      <div class="ver" id="mode-label">local</div>
    </div>
    <div class="search">
      <input id="q" placeholder="筛选任务 id / 标题 / 项目" autocomplete="off"/>
    </div>
    <div class="bar-right">
      <button type="button" class="chip" id="refresh">刷新</button>
      <button type="button" class="btn btn-solid" id="new">新建任务</button>
      <div class="pulse" id="live"><i></i><span>…</span></div>
    </div>
  </header>

  <div class="body">
    <aside class="rail">
      <div>
        <div class="rail-label">Status</div>
        <div id="status-nav"></div>
      </div>
      <div class="bind">
        <div class="rail-label">Workspace</div>
        <div id="workspace"></div>
      </div>
    </aside>

    <main class="stage">
      <div class="stage-head">
        <div>
          <h1 id="stage-title">全部任务</h1>
          <div class="meta" id="count">0</div>
        </div>
      </div>
      <div class="filters">
        <select id="filter-agent"><option value="">Agent · 全部</option></select>
        <select id="filter-source"><option value="">来源 · 全部</option></select>
      </div>
      <div class="list" id="list"></div>
    </main>

    <section class="inspector">
      <div class="insp-scroll" id="detail">
        <div class="empty">
          <div>
            <div class="glyph">§</div>
            <strong>未选择任务</strong>
            从中间列表点选一条，查看公开字段并启动执行。
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<button type="button" class="chat-fab" id="chat-open">
  <span class="dot" id="chat-dot"></span>
  Agent
</button>
<div class="drawer-mask" id="mask"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-h">
    <div>
      <h2>Agent</h2>
      <div class="sub" id="agent-sub">rules</div>
    </div>
    <button type="button" class="btn btn-line" id="chat-close">关闭</button>
  </div>
  <div class="log" id="log"></div>
  <div class="suggest" id="suggest">
    <button type="button" data-q="列出任务">列出任务</button>
    <button type="button" data-q="help">能力说明</button>
  </div>
  <div class="compose">
    <textarea id="input" placeholder="描述你想对任务做的事…"></textarea>
    <div class="compose-row">
      <span class="hint">ENTER 发送 · SHIFT+ENTER 换行</span>
      <button type="button" class="btn btn-solid" id="send">发送</button>
    </div>
  </div>
</aside>

<div class="modal-root" id="modal">
  <div class="modal">
    <h3>新建任务</h3>
    <form class="form" id="form">
      <div class="form-row">
        <label>Task ID<input name="taskId" required/></label>
        <label>Priority<select name="priority"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></label>
      </div>
      <label>Title<input name="title" required placeholder="交付目标"/></label>
      <div class="form-row">
        <label>Project<select name="project" id="project-select"></select></label>
        <label>Agent<select name="targetAgent" id="agent-select"></select></label>
      </div>
      <label>Source<select name="source" id="source-select"><option value="">默认</option></select></label>
      <label>Description<textarea name="description" rows="4"></textarea></label>
      <div class="modal-actions">
        <button type="button" class="btn btn-line" id="cancel">取消</button>
        <button type="submit" class="btn btn-solid">创建</button>
      </div>
    </form>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const cfg = window.__ATL_CONFIG__ || null;
const FLOW = ['待处理','进行中','执行中','待复核','修复中','待发布','待验收','已完成'];
const state = {
  tasks: [], selectedId: null, q: '', status: '', agent: '', source: '',
  workspace: null, projectKey: null, starting: false, chatOpen: false,
};

if (!cfg?.baseUrl || !cfg?.token) {
  document.getElementById('live').classList.add('down');
  document.querySelector('#live span').textContent = 'offline';
} else boot(cfg.baseUrl, cfg.token);

function boot(baseUrl, token) {
  const headers = { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' };
  const api = (p, init = {}) => fetch(`${baseUrl}${p}`, { ...init, headers: { ...headers, ...(init.headers || {}) } })
    .then(async r => {
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error?.message || d?.error?.code || r.statusText);
      return d;
    });
  const $ = id => document.getElementById(id);
  const toast = m => {
    const e = document.createElement('div');
    e.className = 'toast-item';
    e.textContent = m;
    $('toast').appendChild(e);
    setTimeout(() => e.remove(), 2600);
  };
  const setLive = (ok, t) => {
    $('live').classList.toggle('down', !ok);
    $('live').querySelector('span').textContent = t;
  };

  async function loadWorkspace() {
    const ws = await api('/v1/workspace');
    state.workspace = ws;
    state.projectKey = ws.projects[0]?.key || null;
    const hasModel = Boolean(ws.chatAgent);
    $('agent-sub').textContent = hasModel
      ? `model · ${ws.chatAgent.name}`
      : 'rules · 未配置 coding agent';
    $('mode-label').textContent = hasModel ? ws.chatAgent.name : 'rules';
    $('chat-dot').classList.toggle('model', hasModel);

    const box = $('workspace');
    box.innerHTML = '';
    if (!ws.projects.length) {
      box.innerHTML = `<div class="bind-card"><div class="k">Projects</div><div class="v"><strong>未绑定</strong>在 config.json 配置 projects</div></div>`;
    } else {
      ws.projects.forEach(p => {
        const el = document.createElement('button');
        el.type = 'button';
        el.className = 'bind-card';
        el.style.cssText = 'width:100%;text-align:left;margin-bottom:6px;cursor:pointer;' + (p.key === state.projectKey ? 'border-color:var(--copper-line);' : '');
        el.innerHTML = `<div class="k">Project</div><div class="v"><strong>${esc(p.name || p.key)}</strong>${esc(p.key)} · ${esc(p.defaultRepository || '—')}</div>`;
        el.onclick = () => { state.projectKey = p.key; loadWorkspace(); };
        box.appendChild(el);
      });
    }
    if (ws.sources?.length) {
      const s = document.createElement('div');
      s.className = 'bind-card';
      s.style.marginTop = '6px';
      s.innerHTML = `<div class="k">Sources</div><div class="v">${esc(ws.sources.join(' · '))}</div>`;
      box.appendChild(s);
    }

    fillSelect($('project-select'), (ws.projects.length ? ws.projects : [{ key: 'default', name: 'default' }]).map(p => [p.key, p.name || p.key]), state.projectKey);
    fillSelect($('agent-select'), (ws.agents.length ? ws.agents : ['claude', 'codex']).map(a => [a, a]));
    fillSelect($('source-select'), [['', '默认'], ...(ws.sources || []).map(s => [s, s])]);
    fillSelect($('filter-agent'), [['', 'Agent · 全部'], ...(ws.agents || []).map(a => [a, a])], state.agent);
    fillSelect($('filter-source'), [['', '来源 · 全部'], ...(ws.sources || []).map(s => [s, s])], state.source);
  }

  function fillSelect(el, pairs, value) {
    el.innerHTML = '';
    pairs.forEach(([v, t]) => {
      const o = document.createElement('option');
      o.value = v; o.textContent = t; el.appendChild(o);
    });
    if (value != null) el.value = value;
  }

  function stClass(status) {
    if (status === '已失败') return 'fail';
    if (status === '已完成') return 'done';
    if (['执行中', '进行中', '修复中'].includes(status)) return 'run';
    if (['待复核', '待决策', '待发布', '待验收'].includes(status)) return 'wait';
    return '';
  }

  function filtered() {
    const q = state.q.trim().toLowerCase();
    return state.tasks.filter(t => {
      if (state.status && t.status !== state.status) return false;
      if (state.agent && t.targetAgent !== state.agent) return false;
      if (state.source && t.source !== state.source) return false;
      if (!q) return true;
      return [t.taskId, t.title, t.project, t.source, t.targetAgent]
        .filter(Boolean).some(v => String(v).toLowerCase().includes(q));
    });
  }

  function renderNav() {
    const counts = {};
    state.tasks.forEach(t => { counts[t.status] = (counts[t.status] || 0) + 1; });
    const items = [['', '全部'], ...FLOW.map(s => [s, s]), ['已失败', '已失败']];
    $('status-nav').innerHTML = items.map(([v, label]) => {
      const n = v ? (counts[v] || 0) : state.tasks.length;
      return `<button type="button" class="rail-item ${state.status === v ? 'on' : ''}" data-s="${esc(v)}">${esc(label)}<em>${n}</em></button>`;
    }).join('');
    $('status-nav').onclick = e => {
      const b = e.target.closest('button[data-s]');
      if (!b) return;
      state.status = b.getAttribute('data-s') || '';
      $('stage-title').textContent = state.status || '全部任务';
      renderNav();
      renderList();
    };
  }

  function renderList() {
    const items = filtered();
    $('count').textContent = `${items.length} TASKS`;
    if (!items.length) {
      $('list').innerHTML = `<div class="empty"><div><div class="glyph">∅</div><strong>没有任务</strong>调整筛选或新建</div></div>`;
      return;
    }
    $('list').innerHTML = items.map(t => `
      <button type="button" class="row ${t.taskId === state.selectedId ? 'on' : ''}" data-id="${esc(t.taskId)}">
        <div class="id">${esc(t.taskId)}</div>
        <div class="body">
          <div class="t">${esc(t.title)}</div>
          <div class="s">${esc(t.targetAgent || '—')} · P${esc(String(t.priority ?? '—'))} · ${esc(t.project || '—')}</div>
        </div>
        <div class="st ${stClass(t.status)}">${esc(t.status)}</div>
      </button>`).join('');
    $('list').querySelectorAll('.row').forEach(el => {
      el.onclick = () => select(el.dataset.id);
    });
  }

  async function loadTasks(prefer) {
    const params = new URLSearchParams({ limit: '100' });
    if (state.agent) params.set('targetAgent', state.agent);
    const data = await api(`/v1/tasks?${params}`);
    state.tasks = data.tasks || [];
    renderNav();
    renderList();
    const ids = filtered().map(t => t.taskId);
    if (prefer && ids[0]) await select(ids[0]);
    else if (state.selectedId && ids.includes(state.selectedId)) {
      const t = state.tasks.find(x => x.taskId === state.selectedId);
      if (t) renderDetail(t);
    } else if (!state.selectedId && ids[0]) await select(ids[0]);
  }

  async function select(id) {
    if (!id) return;
    state.selectedId = id;
    state.detailTab = state.detailTab || 'overview';
    state.selectedRoundKey = null;
    renderList();
    $('detail').innerHTML = `<div class="empty"><div>加载中…</div></div>`;
    try {
      const d = await api(`/v1/tasks/${encodeURIComponent(id)}`);
      state.currentTask = d.task;
      let rounds = [];
      try {
        const rr = await api(`/v1/tasks/${encodeURIComponent(id)}/rounds`);
        rounds = rr.rounds || [];
      } catch {
        rounds = [];
      }
      state.rounds = rounds;
      renderDetail(d.task, rounds);
    } catch (e) {
      $('detail').innerHTML = `<div class="empty"><div><strong>失败</strong>${esc(e.message)}</div></div>`;
    }
  }

  function renderDetail(t, rounds = state.rounds || []) {
    if (!t) return;
    const tab = state.detailTab || 'overview';
    $('detail').innerHTML = `
      <div class="hero-id">${esc(t.taskId)}</div>
      <div class="hero-title">${esc(t.title)}</div>
      <div class="hero-row">
        <span class="st ${stClass(t.status)}">${esc(t.status)}</span>
        <span class="hint">${esc(t.targetAgent || '')} · P${esc(String(t.priority ?? ''))}</span>
      </div>
      <div class="acts">
        <button type="button" class="btn btn-solid" id="start">启动 / 恢复</button>
        <button type="button" class="btn btn-line" id="ask">问 Agent</button>
        ${t.prLink ? `<a class="btn btn-line" target="_blank" rel="noreferrer" href="${escAttr(t.prLink)}">PR</a>` : ''}
      </div>
      <div class="tabs" id="detail-tabs">
        <button type="button" data-tab="overview" class="${tab === 'overview' ? 'on' : ''}">概览</button>
        <button type="button" data-tab="rounds" class="${tab === 'rounds' ? 'on' : ''}">Rounds (${rounds.length})</button>
        <button type="button" data-tab="transcript" class="${tab === 'transcript' ? 'on' : ''}">Transcript</button>
        <button type="button" data-tab="logs" class="${tab === 'logs' ? 'on' : ''}">Logs</button>
      </div>
      <div id="detail-body"></div>`;
    $('start').onclick = () => startTask(t.taskId);
    $('ask').onclick = () => {
      openChat();
      $('input').value = `查看 ${t.taskId} 并总结当前进度`;
      $('input').focus();
    };
    $('detail-tabs').onclick = e => {
      const b = e.target.closest('button[data-tab]');
      if (!b) return;
      state.detailTab = b.dataset.tab;
      renderDetail(t, rounds);
    };
    const body = $('detail-body');
    if (tab === 'overview') {
      body.innerHTML = `
        <div class="section" style="border-top:0;padding-top:0"><h4>Description</h4><p>${esc(t.description || '—')}</p></div>
        <div class="section"><h4>Progress</h4><p>${esc(t.progressSummary || '—')}</p></div>
        <div class="section"><h4>Result</h4><p>${esc(t.resultSummary || '—')}</p></div>
        <div class="section"><h4>Meta</h4>
          <dl class="kv">
            <dt>project</dt><dd>${esc(t.project || '—')}</dd>
            <dt>source</dt><dd>${esc(t.source || '—')}</dd>
            <dt>repo</dt><dd>${esc(t.repository || '—')}</dd>
            <dt>owner</dt><dd>${esc(t.currentOwner || '—')}</dd>
            <dt>updated</dt><dd>${esc(t.updatedAt || '—')}</dd>
          </dl>
        </div>`;
    } else if (tab === 'rounds') {
      if (!rounds.length) {
        body.innerHTML = `<div class="empty"><div><strong>暂无 rounds</strong>启动任务后，execute/review 会出现在这里。</div></div>`;
      } else {
        body.innerHTML = `<div class="rounds">${rounds.map(r => `
          <button type="button" class="round ${state.selectedRoundKey === r.key ? 'on' : ''}" data-key="${esc(r.key)}" data-sid="${esc(r.sessionId || '')}">
            <span class="rk">r${esc(String(r.round))} · ${esc(r.kind)}</span>
            <span class="rm ${r.hasTranscript ? 'dot-yes' : 'dot-no'}">${r.hasTranscript ? '有 transcript' : '无稿'}</span>
            <span class="rt">${esc(r.agent)}${r.at ? ' · ' + esc(r.at) : ''}${r.sessionName ? ' · ' + esc(r.sessionName) : ''}</span>
          </button>`).join('')}</div>
          <p class="hint" style="margin-top:10px">点击 round 打开 Transcript</p>`;
        body.querySelectorAll('.round').forEach(el => {
          el.onclick = () => {
            state.selectedRoundKey = el.dataset.key;
            state.selectedSessionId = el.dataset.sid || '';
            state.detailTab = 'transcript';
            renderDetail(t, rounds);
          };
        });
      }
    } else if (tab === 'transcript') {
      body.innerHTML = `<div class="empty"><div>加载 transcript…</div></div>`;
      const params = new URLSearchParams();
      if (state.selectedRoundKey) params.set('roundKey', state.selectedRoundKey);
      if (state.selectedSessionId) params.set('sessionId', state.selectedSessionId);
      api(`/v1/tasks/${encodeURIComponent(t.taskId)}/transcript?${params}`)
        .then(tr => {
          if (!tr.messages?.length) {
            body.innerHTML = `<div class="empty"><div><strong>没有 transcript</strong>该 round 可能尚未落盘，或 session 已被清理。可先在 Rounds 选有「有 transcript」的项。</div></div>`;
            return;
          }
          const counts = tr.roleCounts
            ? Object.entries(tr.roleCounts).map(([k, v]) => `${k}:${v}`).join(' · ')
            : '';
          body.innerHTML = `
            <p class="hint" style="margin-bottom:8px">${esc(tr.roundKey)}${tr.sessionId ? ' · sid ' + esc(String(tr.sessionId).slice(0, 12)) + '…' : ''}${tr.truncated ? ' · truncated' : ''} · ${tr.messages.length} msgs${counts ? ' · ' + esc(counts) : ''}</p>
            <div class="msgs">${tr.messages.map(m => {
              const label = m.role === 'tool'
                ? `tool · ${esc(m.toolName || m.text || 'tool')}`
                : esc(m.role);
              const text = m.role === 'tool' && m.toolName
                ? (m.text && m.text !== m.toolName ? esc(m.text) : '')
                : esc(m.text);
              return `
              <div class="msg-row ${esc(m.role)}">
                <div class="mr">${label}${m.at ? ' · ' + esc(formatShortTime(m.at)) : ''}</div>
                ${text ? `<div class="mt">${text}</div>` : '<div class="mt hint">（仅工具名）</div>'}
              </div>`;
            }).join('')}</div>`;
        })
        .catch(e => {
          body.innerHTML = `<div class="empty"><div><strong>加载失败</strong>${esc(e.message)}</div></div>`;
        });
    } else if (tab === 'logs') {
      body.innerHTML = `<div class="empty"><div>加载 logs…</div></div>`;
      api(`/v1/tasks/${encodeURIComponent(t.taskId)}/log-tail`)
        .then(log => {
          if (!log.available || !log.lines?.length) {
            body.innerHTML = `<div class="empty"><div><strong>没有 log</strong>runner 日志不可用或尚未产生。</div></div>`;
            return;
          }
          body.innerHTML = `
            <p class="hint" style="margin-bottom:8px">${log.truncated ? 'truncated · ' : ''}${log.lines.length} lines · 已脱敏</p>
            <div class="logbox">${esc(log.lines.join('\n'))}</div>`;
        })
        .catch(e => {
          body.innerHTML = `<div class="empty"><div><strong>加载失败</strong>${esc(e.message)}</div></div>`;
        });
    }
  }

  async function startTask(taskId) {
    if (state.starting) return;
    state.starting = true;
    try {
      const r = await api(`/v1/tasks/${encodeURIComponent(taskId)}/start`, {
        method: 'POST', body: JSON.stringify({ maxRounds: 5 }),
      });
      toast(`已启动 ${taskId} · ${r.runPhase || 'running'}`);
      await loadTasks();
      if (state.selectedId === taskId) await select(taskId);
    } catch (e) {
      toast(`启动失败：${e.message}`);
    } finally {
      state.starting = false;
    }
  }

  function openChat() {
    state.chatOpen = true;
    $('drawer').classList.add('open');
    $('mask').classList.add('open');
  }
  function closeChat() {
    state.chatOpen = false;
    $('drawer').classList.remove('open');
    $('mask').classList.remove('open');
  }

  function append(role, content, toolCalls, mode) {
    const el = document.createElement('div');
    el.className = `bubble ${role === 'user' ? 'user' : 'bot'}`;
    const tools = (toolCalls || []).map(t =>
      `<span class="tool ${t.ok ? 'ok' : 'bad'}">${esc(String(t.toolId || '').replace('agent-task-loop/', ''))}</span>`
    ).join('');
    el.innerHTML = `<div class="who">${role === 'user' ? 'You' : 'Agent'}${mode ? ' · ' + esc(mode) : ''}</div>${esc(content)}${tools ? `<div class="tools">${tools}</div>` : ''}`;
    $('log').appendChild(el);
    $('log').scrollTop = $('log').scrollHeight;
  }

  async function send(preset) {
    const message = (preset ?? $('input').value).trim();
    if (!message) return;
    if (!preset) $('input').value = '';
    append('user', message);
    const thinking = document.createElement('div');
    thinking.className = 'bubble bot';
    thinking.innerHTML = '<div class="who">Agent</div>…';
    $('log').appendChild(thinking);
    try {
      const r = await api('/v1/chat', {
        method: 'POST',
        body: JSON.stringify({ message, sessionId: 'ui' }),
      });
      thinking.remove();
      append('assistant', r.reply || '完成', r.toolCalls, r.mode);
      await loadTasks();
      const m = message.match(/\b([A-Z][A-Z0-9]*-\w+)\b/);
      if (m) await select(m[1]);
    } catch (e) {
      thinking.remove();
      append('assistant', `错误：${e.message}`);
    }
  }

  try {
    const es = new EventSource(`${baseUrl}/v1/events?token=${encodeURIComponent(token)}`);
    es.onmessage = ev => {
      try {
        const d = JSON.parse(ev.data);
        if (d.type === 'task.updated' || d.type === 'board.refresh') {
          loadTasks();
          if (d.task && d.taskId === state.selectedId) renderDetail(d.task);
        }
      } catch {}
    };
    es.onopen = () => setLive(true, 'live');
    es.onerror = () => setLive(false, 'retry');
  } catch {
    setLive(false, 'sse off');
  }

  $('refresh').onclick = () => loadTasks();
  $('q').oninput = e => { state.q = e.target.value; renderList(); };
  $('filter-agent').onchange = e => { state.agent = e.target.value; renderList(); };
  $('filter-source').onchange = e => { state.source = e.target.value; renderList(); };
  $('chat-open').onclick = openChat;
  $('chat-close').onclick = closeChat;
  $('mask').onclick = closeChat;
  $('send').onclick = () => send();
  $('input').onkeydown = e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };
  $('suggest').onclick = e => {
    const b = e.target.closest('button[data-q]');
    if (b) send(b.dataset.q);
  };
  $('new').onclick = () => {
    $('form').reset();
    $('form').taskId.value = `TASK-${Date.now().toString(36).toUpperCase()}`;
    if (state.projectKey) $('project-select').value = state.projectKey;
    $('modal').classList.add('open');
  };
  $('cancel').onclick = () => $('modal').classList.remove('open');
  $('modal').onclick = e => { if (e.target === $('modal')) $('modal').classList.remove('open'); };
  $('form').onsubmit = async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = {
      taskId: String(fd.get('taskId') || '').trim(),
      title: String(fd.get('title') || '').trim(),
      project: String(fd.get('project') || state.projectKey || 'default').trim(),
      targetAgent: String(fd.get('targetAgent') || 'claude'),
      priority: Number(fd.get('priority') || 3),
      description: String(fd.get('description') || ''),
    };
    const source = String(fd.get('source') || '');
    if (source) body.source = source;
    try {
      await api('/v1/tasks', { method: 'POST', body: JSON.stringify(body) });
      $('modal').classList.remove('open');
      toast(`已创建 ${body.taskId}`);
      await loadTasks();
      await select(body.taskId);
    } catch (err) {
      toast(`创建失败：${err.message}`);
    }
  };

  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement?.tagName !== 'INPUT' && document.activeElement?.tagName !== 'TEXTAREA') {
      e.preventDefault();
      $('q').focus();
    }
    if (e.key === 'Escape') {
      closeChat();
      $('modal').classList.remove('open');
    }
  });

  append('assistant', '四工具 Task Manager。配置了 coding agent 时走模型规划（气泡标注 model），否则 rules。工作区来自本地 config 的 projects/sources，不含绝对路径。');
  api('/v1/health').then(() => setLive(true, 'live')).catch(() => setLive(false, 'down'));
  loadWorkspace().then(() => loadTasks(true)).catch(e => toast(`工作区：${e.message}`));
}

function formatShortTime(v) {
  if (!v) return '';
  const d = new Date(v);
  if (Number.isNaN(d.getTime())) return String(v).slice(0, 19);
  return d.toLocaleString();
}
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function escAttr(s) { return esc(s).replace(/'/g, '&#39;'); }
</script>
</body>
</html>
