name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: corepack enable

      - run: corepack prepare pnpm@9.15.9 --activate

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build
