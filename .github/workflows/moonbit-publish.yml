name: Publish MoonBit Package

on:
  release:
    types:
      - released
  workflow_dispatch:
  workflow_call:
    secrets:
      MOONCAKES_PERFECTPAN_TOKEN:
        required: true

concurrency: Publish MoonBit Package-${{ github.ref }}

permissions:
  contents: read

jobs:
  publish-moonbit:
    runs-on: ubuntu-latest
    env:
      MOONCAKES_PERFECTPAN_TOKEN: ${{ secrets.MOONCAKES_PERFECTPAN_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          "$HOME/.moon/bin/moon" version --all

      - name: Check MoonBit module
        run: moon -C packages/agent-finder check --target all

      - name: Test MoonBit module
        run: moon -C packages/agent-finder test --target all

      - name: Package MoonBit module
        run: moon -C packages/agent-finder package

      - name: Configure mooncakes.io credentials
        run: |
          test -n "$MOONCAKES_PERFECTPAN_TOKEN"
          mkdir -p "$HOME/.moon"
          printf '%s' "$MOONCAKES_PERFECTPAN_TOKEN" > "$HOME/.moon/credentials.json"
          chmod 600 "$HOME/.moon/credentials.json"

      - name: Publish to mooncakes.io
        # The MoonBit module version (moon.mod.json) only changes when a
        # changeset bumps @rivus/agent-finder-core. On releases where it is
        # unchanged, `moon publish` returns a duplicate-version 409 — treat that
        # as a no-op success so the release workflow stays green. Any other
        # failure still fails the step.
        run: |
          set +e
          output="$(moon -C packages/agent-finder publish 2>&1)"
          status=$?
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ]; then
            if printf '%s' "$output" | grep -qiE "duplicated|already (been )?(published|exists)|409"; then
              echo "::notice::MoonBit version already on mooncakes.io — nothing to publish."
              exit 0
            fi
            exit "$status"
          fi
