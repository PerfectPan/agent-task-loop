name: Publish Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - run: corepack enable

      - run: corepack prepare pnpm@9.15.9 --activate

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm --filter @perfectpan/agent-task-loop build

      - name: Publish to npm
        working-directory: packages/agent-task-loop
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
