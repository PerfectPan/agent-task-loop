<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATL Console</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --bg-2: #ebe6db;
      --panel: #fffcf6;
      --panel-ink: #ffffff;
      --line: #ddd4c4;
      --line-strong: #c9beaa;
      --ink: #1c1915;
      --ink-2: #3d3830;
      --muted: #6f675c;
      --faint: #9a9184;
      --accent: #0f6e56;
      --accent-soft: #d8f3e7;
      --accent-hot: #c45c26;
      --accent-hot-soft: #fce8dc;
      --blue: #2a5f9e;
      --blue-soft: #e4eefc;
      --violet: #5b4b8a;
      --violet-soft: #ece7f8;
      --danger: #b42318;
      --danger-soft: #fce8e6;
      --ok: #0f6e56;
      --shadow: 0 1px 0 rgba(28,25,21,0.04), 0 12px 32px rgba(28,25,21,0.08);
      --radius: 16px;
      --font: "SF Pro Text", "PingFang SC", "Segoe UI", system-ui, sans-serif;
      --mono: "SF Mono", "JetBrains Mono", ui-monospace, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(900px 420px at 0% 0%, rgba(15,110,86,0.08), transparent 55%),
        radial-gradient(700px 380px at 100% 0%, rgba(196,92,38,0.07), transparent 50%),
        linear-gradient(180deg, #f7f3eb 0%, var(--bg) 40%, #efe9de 100%);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    button, input, select, textarea { font: inherit; color: inherit; }
    button { cursor: pointer; border: 0; background: none; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: 64px 1fr;
      padding: 12px;
      gap: 12px;
    }

    /* Top */
    .top {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 14px 0 10px;
      background: rgba(255,252,246,0.86);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 190px;
    }
    .logo {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: linear-gradient(145deg, #148567, #0b4f3d);
      color: #eafff6;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.04em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 8px 18px rgba(15,110,86,0.25);
    }
    .brand h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .brand p {
      font-size: 11px;
      color: var(--muted);
    }
    .search {
      flex: 1;
      max-width: 440px;
      position: relative;
    }
    .search input {
      width: 100%;
      height: 40px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 0 14px 0 40px;
      outline: none;
      box-shadow: inset 0 1px 2px rgba(28,25,21,0.04);
    }
    .search input:focus {
      border-color: #7bbfa8;
      box-shadow: 0 0 0 4px rgba(15,110,86,0.12);
    }
    .search svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.45;
    }
    .top-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .seg {
      display: inline-flex;
      padding: 3px;
      gap: 2px;
      border-radius: 999px;
      background: var(--bg-2);
      border: 1px solid var(--line);
    }
    .seg button {
      height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }
    .seg button.on {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 1px 2px rgba(28,25,21,0.08);
    }
    .btn {
      height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 650;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid transparent;
      transition: transform .12s, background .12s, box-shadow .12s;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: linear-gradient(180deg, #17956f, var(--accent));
      color: #fff;
      box-shadow: 0 8px 18px rgba(15,110,86,0.22);
    }
    .btn-primary:hover { filter: brightness(1.04); }
    .btn-secondary {
      background: #fff;
      border-color: var(--line);
      color: var(--ink-2);
    }
    .btn-secondary:hover { border-color: var(--line-strong); background: #fffcf7; }
    .btn-hot {
      background: linear-gradient(180deg, #d96b33, var(--accent-hot));
      color: #fff;
      box-shadow: 0 8px 18px rgba(196,92,38,0.22);
    }
    .btn-hot:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
    .live {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }
    .live i {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 3px rgba(15,110,86,0.15);
    }
    .live.down i { background: var(--danger); box-shadow: 0 0 0 3px rgba(180,35,24,0.12); }

    /* Body */
    .body {
      min-height: 0;
      display: grid;
      grid-template-columns: 360px minmax(0, 1.25fr) 340px;
      gap: 12px;
    }
    .panel {
      min-height: 0;
      background: rgba(255,252,246,0.92);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-h {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 16px 10px;
    }
    .panel-h h2 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .panel-h .sub {
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .filters {
      display: flex;
      gap: 8px;
      padding: 0 16px 12px;
    }
    .filters select {
      flex: 1;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 0 10px;
      font-size: 12px;
      color: var(--ink-2);
    }
    .scroll { flex: 1; min-height: 0; overflow: auto; }

    /* Task list (default) */
    .task-list { padding: 0 10px 12px; display: flex; flex-direction: column; gap: 8px; }
    .task {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 12px 12px 12px 14px;
      position: relative;
      transition: border-color .12s, box-shadow .12s, transform .12s;
    }
    .task::before {
      content: "";
      position: absolute;
      left: 0; top: 12px; bottom: 12px;
      width: 3px;
      border-radius: 999px;
      background: var(--line-strong);
    }
    .task:hover {
      border-color: #b7d9cb;
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(28,25,21,0.06);
    }
    .task.active {
      border-color: #8dceba;
      background: linear-gradient(180deg, #f3fbf7, #fff);
      box-shadow: 0 0 0 3px rgba(15,110,86,0.1);
    }
    .task.active::before { background: var(--accent); }
    .task-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .tid {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-hot);
      letter-spacing: 0.02em;
    }
    .pill {
      font-size: 11px;
      font-weight: 650;
      padding: 3px 8px;
      border-radius: 999px;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .pill.s-todo { background: #f3efe6; color: #6a6154; }
    .pill.s-run { background: var(--accent-soft); color: var(--accent); }
    .pill.s-wait { background: var(--blue-soft); color: var(--blue); }
    .pill.s-fix { background: var(--accent-hot-soft); color: var(--accent-hot); }
    .pill.s-done { background: #e7f6ee; color: #0f6e56; }
    .pill.s-fail { background: var(--danger-soft); color: var(--danger); }
    .task-title {
      font-size: 14px;
      font-weight: 650;
      line-height: 1.35;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      font-size: 11px;
      color: var(--muted);
    }
    .task-meta b {
      font-weight: 650;
      color: var(--ink-2);
    }

    /* Board mode denser */
    .board {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(220px, 1fr);
      gap: 10px;
      padding: 0 12px 12px;
      min-height: 100%;
    }
    .lane {
      background: rgba(244,241,234,0.7);
      border: 1px solid var(--line);
      border-radius: 14px;
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }
    .lane-h {
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 700;
      border-bottom: 1px solid var(--line);
    }
    .lane-h span {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .lane-b { padding: 8px; display: flex; flex-direction: column; gap: 8px; }

    /* Inspector */
    .detail {
      padding: 8px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .hero {
      padding: 8px 4px 0;
    }
    .hero .kicker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .hero h3 {
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: -0.03em;
      font-weight: 750;
      max-width: 40ch;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .flow {
      display: flex;
      gap: 0;
      overflow-x: auto;
      padding: 4px 0 2px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }
    .flow-step {
      flex: 1;
      min-width: 72px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--faint);
      padding: 12px 6px 10px;
      position: relative;
      border-right: 1px solid var(--line);
    }
    .flow-step:last-child { border-right: 0; }
    .flow-step.on {
      color: var(--accent);
      background: linear-gradient(180deg, #eefaf4, #fff);
    }
    .flow-step.done { color: #3d7a66; }
    .flow-step.on::after {
      content: "";
      position: absolute;
      left: 20%; right: 20%;
      bottom: 0;
      height: 3px;
      border-radius: 999px 999px 0 0;
      background: var(--accent);
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .block {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
    }
    .block h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--faint);
      margin-bottom: 8px;
      font-weight: 700;
    }
    .block p {
      font-size: 13.5px;
      line-height: 1.55;
      color: var(--ink-2);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .kv {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 8px 10px;
      font-size: 13px;
    }
    .kv dt { color: var(--muted); }
    .kv dd { color: var(--ink); overflow-wrap: anywhere; font-weight: 550; }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 32px;
      color: var(--muted);
    }
    .empty .illus {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      margin: 0 auto 14px;
      background:
        linear-gradient(145deg, rgba(15,110,86,0.12), rgba(196,92,38,0.12));
      border: 1px dashed var(--line-strong);
      display: grid;
      place-items: center;
      font-size: 28px;
    }
    .empty strong {
      display: block;
      color: var(--ink);
      font-size: 16px;
      margin-bottom: 6px;
    }

    /* Chat */
    .chat { display: flex; flex-direction: column; height: 100%; min-height: 0; }
    .chat-log {
      flex: 1;
      overflow: auto;
      padding: 4px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 95%;
      border-radius: 16px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: linear-gradient(180deg, #e7f6ee, #d8f3e7);
      border: 1px solid #b7e0cd;
      color: #0d4d3c;
    }
    .msg.bot {
      align-self: flex-start;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--ink-2);
    }
    .msg .who {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 5px;
    }
    .tools { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .tool {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--bg-2);
      color: var(--muted);
      border: 1px solid var(--line);
    }
    .tool.ok { background: var(--accent-soft); color: var(--accent); border-color: #b7e0cd; }
    .tool.bad { background: var(--danger-soft); color: var(--danger); border-color: #f0c2bc; }
    .suggest {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 14px 10px;
    }
    .suggest button {
      font-size: 11px;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--ink-2);
    }
    .suggest button:hover { border-color: #8dceba; background: #f3fbf7; }
    .compose {
      border-top: 1px solid var(--line);
      padding: 12px;
      background: rgba(255,252,246,0.9);
      display: grid;
      gap: 8px;
    }
    .compose textarea {
      width: 100%;
      min-height: 68px;
      max-height: 140px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px 12px;
      outline: none;
    }
    .compose textarea:focus {
      border-color: #8dceba;
      box-shadow: 0 0 0 4px rgba(15,110,86,0.1);
    }
    .compose-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .hint { font-size: 11px; color: var(--faint); }

    /* Modal / toast */
    .modal-root {
      position: fixed; inset: 0;
      background: rgba(28,25,21,0.28);
      display: none;
      place-items: center;
      z-index: 40;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    .modal-root.open { display: grid; }
    .modal {
      width: min(520px, 100%);
      background: #fffcf6;
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(28,25,21,0.18);
      padding: 18px;
    }
    .modal h3 { font-size: 18px; margin-bottom: 12px; letter-spacing: -0.02em; }
    .form { display: grid; gap: 10px; }
    .form label { display: grid; gap: 5px; font-size: 12px; font-weight: 600; color: var(--muted); }
    .form input, .form select, .form textarea {
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 0 12px;
      outline: none;
      font-weight: 500;
      color: var(--ink);
    }
    .form textarea { height: auto; padding: 10px 12px; }
    .form input:focus, .form select:focus, .form textarea:focus {
      border-color: #8dceba;
      box-shadow: 0 0 0 4px rgba(15,110,86,0.1);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
    .toast {
      position: fixed; right: 18px; bottom: 18px; z-index: 50;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast-item {
      background: #1c1915;
      color: #f7f3eb;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: var(--shadow);
      animation: up .18s ease;
    }
    @keyframes up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    @media (max-width: 1180px) {
      .body { grid-template-columns: 320px 1fr; }
      .panel.chat { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="brand">
        <div class="logo">ATL</div>
        <div>
          <h1>任务工作台</h1>
          <p>本地编排 · Rivus 工具</p>
        </div>
      </div>
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
        <input id="q" type="search" placeholder="搜索任务 ID、标题、项目…" autocomplete="off" />
      </div>
      <div class="top-right">
        <div class="seg" id="view-seg">
          <button type="button" data-view="list" class="on">列表</button>
          <button type="button" data-view="board">看板</button>
        </div>
        <button type="button" class="btn btn-secondary" id="refresh-btn">刷新</button>
        <button type="button" class="btn btn-primary" id="new-btn">＋ 新建任务</button>
        <div class="live" id="live"><i></i><span>连接中</span></div>
      </div>
    </header>

    <div class="body">
      <section class="panel">
        <div class="panel-h">
          <h2>任务</h2>
          <span class="sub" id="count-label">0</span>
        </div>
        <div class="filters">
          <select id="filter-status">
            <option value="">全部状态</option>
            <option>待处理</option><option>进行中</option><option>执行中</option>
            <option>待复核</option><option>修复中</option><option>待决策</option>
            <option>待发布</option><option>待验收</option><option>已完成</option><option>已失败</option>
          </select>
          <select id="filter-agent">
            <option value="">全部 Agent</option>
            <option>claude</option><option>codex</option><option>coco</option><option>glm</option>
          </select>
        </div>
        <div class="scroll" id="board-root"></div>
      </section>

      <section class="panel">
        <div class="panel-h">
          <h2>详情</h2>
          <span class="sub">仅公开字段</span>
        </div>
        <div class="scroll" id="detail-root">
          <div class="empty">
            <div>
              <div class="illus">◎</div>
              <strong>选择左侧任务</strong>
              查看进度、启动执行，或让右侧 Agent 帮你操作。
            </div>
          </div>
        </div>
      </section>

      <section class="panel chat">
        <div class="panel-h">
          <h2>Rivus Agent</h2>
          <span class="sub">list · get · create · start</span>
        </div>
        <div class="chat">
          <div class="chat-log" id="chat-log">
            <div class="msg bot">
              <div class="who">Task Manager</div>
              我是本地 Rivus 任务助手，只能使用四个工具：列出、查看、创建、启动任务。不会接触路径、凭据或 PID。
            </div>
          </div>
          <div class="suggest" id="suggest">
            <button type="button" data-q="列出任务">列出任务</button>
            <button type="button" data-q="列出执行中的任务">执行中</button>
            <button type="button" data-q="help">能做什么</button>
          </div>
          <div class="compose">
            <textarea id="chat-input" placeholder="例如：启动 SMOKE-002，或创建一个修复登录的任务"></textarea>
            <div class="compose-row">
              <span class="hint">Enter 发送 · Shift+Enter 换行</span>
              <button type="button" class="btn btn-primary" id="chat-send">发送</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div class="modal-root" id="modal">
    <div class="modal" role="dialog" aria-modal="true">
      <h3>新建任务</h3>
      <form class="form" id="create-form">
        <div class="form-row">
          <label>任务 ID<input name="taskId" required maxlength="128" /></label>
          <label>优先级
            <select name="priority">
              <option value="1">1 高</option><option value="2">2</option>
              <option value="3" selected>3 中</option><option value="4">4</option><option value="5">5 低</option>
            </select>
          </label>
        </div>
        <label>标题<input name="title" required maxlength="200" placeholder="一句话说明要交付什么" /></label>
        <div class="form-row">
          <label>项目<input name="project" required maxlength="120" placeholder="agent-task-loop" /></label>
          <label>Agent
            <select name="targetAgent">
              <option value="claude">claude</option>
              <option value="codex">codex</option>
              <option value="coco">coco</option>
              <option value="glm">glm</option>
            </select>
          </label>
        </div>
        <label>描述<textarea name="description" rows="4" maxlength="8000" placeholder="背景、范围、验收标准…"></textarea></label>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="modal-cancel">取消</button>
          <button type="submit" class="btn btn-primary">创建</button>
        </div>
      </form>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const cfg = window.__ATL_CONFIG__ || window.atlDesktop?.getConfig?.() || null;
    const FLOW = ['待处理','进行中','执行中','待复核','修复中','待发布','待验收','已完成'];

    const state = {
      view: 'list',
      tasks: [],
      selectedId: null,
      query: '',
      status: '',
      agent: '',
      starting: false,
    };

    if (!cfg?.baseUrl || !cfg?.token) {
      document.getElementById('live').classList.add('down');
      document.querySelector('#live span').textContent = '未配置';
      document.getElementById('board-root').innerHTML =
        '<div class="empty"><div><strong>请先启动服务</strong>pnpm --filter @rivus/agent-task-loop-desktop dev:electron</div></div>';
    } else {
      boot(cfg.baseUrl, cfg.token);
    }

    function boot(baseUrl, token) {
      const headers = {
        Authorization: `Bearer ${token}`,
        'Content-Type': 'application/json',
      };
      const api = (path, init = {}) =>
        fetch(`${baseUrl}${path}`, { ...init, headers: { ...headers, ...(init.headers || {}) } })
          .then(async r => {
            const data = await r.json().catch(() => ({}));
            if (!r.ok) throw new Error(data?.error?.message || data?.error?.code || r.statusText);
            return data;
          });

      const $ = id => document.getElementById(id);

      function toast(msg) {
        const el = document.createElement('div');
        el.className = 'toast-item';
        el.textContent = msg;
        $('toast').appendChild(el);
        setTimeout(() => el.remove(), 2800);
      }

      function setLive(ok, label) {
        $('live').classList.toggle('down', !ok);
        $('live').querySelector('span').textContent = label;
      }

      async function health() {
        try {
          const d = await fetch(`${baseUrl}/v1/health`).then(r => r.json());
          setLive(true, d.status === 'ok' ? '已连接' : (d.status || '在线'));
        } catch {
          setLive(false, '离线');
        }
      }

      async function loadTasks({ preferSelect } = {}) {
        const params = new URLSearchParams({ limit: '100' });
        if (state.status) params.set('status', state.status);
        if (state.agent) params.set('targetAgent', state.agent);
        try {
          const data = await api(`/v1/tasks?${params}`);
          state.tasks = data.tasks || [];
          $('count-label').textContent = `${state.tasks.length}${data.truncated ? '+' : ''} 项`;
          renderBoard();
          const ids = filtered().map(t => t.taskId);
          if (preferSelect && ids[0]) {
            await selectTask(ids[0], { silent: true });
          } else if (state.selectedId && ids.includes(state.selectedId)) {
            const t = state.tasks.find(x => x.taskId === state.selectedId);
            if (t) renderDetail(t);
          } else if (state.selectedId && !ids.includes(state.selectedId)) {
            state.selectedId = null;
            renderEmptyDetail();
          } else if (!state.selectedId && ids[0]) {
            await selectTask(ids[0], { silent: true });
          }
        } catch (e) {
          toast(`加载失败：${e.message}`);
          setLive(false, '错误');
        }
      }

      function filtered() {
        const q = state.query.trim().toLowerCase();
        return state.tasks.filter(t => {
          if (!q) return true;
          return [t.taskId, t.title, t.project, t.source, t.repository, t.targetAgent]
            .filter(Boolean)
            .some(v => String(v).toLowerCase().includes(q));
        });
      }

      function pillClass(status) {
        if (status === '已失败') return 's-fail';
        if (status === '已完成') return 's-done';
        if (['执行中','进行中','修复中'].includes(status)) return 's-run';
        if (['待复核','待决策','待发布','待验收'].includes(status)) return 's-wait';
        if (status === '待处理') return 's-todo';
        return 's-fix';
      }

      function card(t, active) {
        return `
          <button type="button" class="task ${active ? 'active' : ''}" data-id="${esc(t.taskId)}">
            <div class="task-top">
              <span class="tid">${esc(t.taskId)}</span>
              <span class="pill ${pillClass(t.status)}">${esc(t.status)}</span>
            </div>
            <div class="task-title">${esc(t.title)}</div>
            <div class="task-meta">
              <span><b>${esc(t.targetAgent || '—')}</b></span>
              <span>P${esc(String(t.priority ?? '—'))}</span>
              <span>${esc(t.project || '—')}</span>
            </div>
          </button>`;
      }

      function renderBoard() {
        const items = filtered();
        const root = $('board-root');
        if (!items.length) {
          root.innerHTML = `<div class="empty"><div><div class="illus">∅</div><strong>没有任务</strong>调整筛选，或新建一个任务。</div></div>`;
          return;
        }
        if (state.view === 'board') {
          const present = FLOW.filter(s => items.some(t => t.status === s));
          const extra = [...new Set(items.map(t => t.status).filter(s => !FLOW.includes(s)))];
          const cols = [...present, ...extra];
          if (!cols.length) cols.push('待处理');
          root.innerHTML = `<div class="board">${cols.map(status => {
            const col = items.filter(t => t.status === status);
            return `<div class="lane">
              <div class="lane-h"><div>${esc(status)}</div><span>${col.length}</span></div>
              <div class="lane-b">${col.map(t => card(t, t.taskId === state.selectedId)).join('')}</div>
            </div>`;
          }).join('')}</div>`;
        } else {
          root.innerHTML = `<div class="task-list">${items.map(t => card(t, t.taskId === state.selectedId)).join('')}</div>`;
        }
        root.querySelectorAll('.task').forEach(el => {
          el.addEventListener('click', () => selectTask(el.getAttribute('data-id')));
        });
      }

      function renderEmptyDetail() {
        $('detail-root').innerHTML = `<div class="empty"><div>
          <div class="illus">◎</div>
          <strong>选择左侧任务</strong>
          查看进度、启动执行，或让右侧 Agent 帮你操作。
        </div></div>`;
      }

      async function selectTask(id, { silent } = {}) {
        if (!id) return;
        if (state.selectedId === id && !silent) return;
        state.selectedId = id;
        renderBoard();
        $('detail-root').innerHTML = '<div class="empty"><div>加载中…</div></div>';
        try {
          const data = await api(`/v1/tasks/${encodeURIComponent(id)}`);
          renderDetail(data.task);
        } catch (e) {
          $('detail-root').innerHTML = `<div class="empty"><div><strong>加载失败</strong>${esc(e.message)}</div></div>`;
        }
      }

      function renderDetail(t) {
        if (!t) return renderEmptyDetail();
        const idx = FLOW.indexOf(t.status);
        const flow = FLOW.map((s, i) => {
          const cls = s === t.status ? 'on' : (idx >= 0 && i < idx ? 'done' : '');
          return `<div class="flow-step ${cls}">${esc(s)}</div>`;
        }).join('');
        $('detail-root').innerHTML = `
          <div class="detail">
            <div class="hero">
              <div class="kicker">
                <span class="tid">${esc(t.taskId)}</span>
                <span class="pill ${pillClass(t.status)}">${esc(t.status)}</span>
                <span class="sub" style="color:var(--muted)">${esc(t.targetAgent || '')} · P${esc(String(t.priority ?? ''))}</span>
              </div>
              <h3>${esc(t.title)}</h3>
              <div class="actions">
                <button type="button" class="btn btn-hot" id="start-btn">启动 / 恢复</button>
                <button type="button" class="btn btn-secondary" id="ask-btn">问 Agent</button>
                ${t.prLink ? `<a class="btn btn-secondary" href="${escAttr(t.prLink)}" target="_blank" rel="noreferrer">打开 PR</a>` : ''}
              </div>
            </div>
            <div class="flow">${flow}</div>
            <div class="block">
              <h4>描述</h4>
              <p>${esc(t.description || '暂无描述')}</p>
            </div>
            <div class="grid-2">
              <div class="block"><h4>进度</h4><p>${esc(t.progressSummary || '—')}</p></div>
              <div class="block"><h4>结果</h4><p>${esc(t.resultSummary || '—')}</p></div>
            </div>
            <div class="block">
              <h4>元数据</h4>
              <dl class="kv">
                <dt>项目</dt><dd>${esc(t.project || '—')}</dd>
                <dt>来源</dt><dd>${esc(t.source || '—')}</dd>
                <dt>仓库</dt><dd>${esc(t.repository || '—')}</dd>
                <dt>负责人</dt><dd>${esc(t.currentOwner || '—')}</dd>
                <dt>评审轮次</dt><dd>${esc(String(t.reviewRound ?? '—'))} ${esc(t.reviewVerdict || '')}</dd>
                <dt>更新时间</dt><dd>${esc(formatTime(t.updatedAt))}</dd>
              </dl>
            </div>
          </div>`;
        $('start-btn')?.addEventListener('click', () => startTask(t.taskId));
        $('ask-btn')?.addEventListener('click', () => {
          $('chat-input').value = `查看 ${t.taskId} 的状态并总结进度`;
          $('chat-input').focus();
        });
      }

      async function startTask(taskId) {
        if (state.starting) return;
        state.starting = true;
        const btn = $('start-btn');
        if (btn) { btn.disabled = true; btn.textContent = '启动中…'; }
        try {
          const res = await api(`/v1/tasks/${encodeURIComponent(taskId)}/start`, {
            method: 'POST',
            body: JSON.stringify({ maxRounds: 5 }),
          });
          toast(`已启动 ${taskId} · ${res.runPhase || 'running'}`);
          await loadTasks();
          if (res.task) renderDetail(res.task);
        } catch (e) {
          toast(`启动失败：${e.message}`);
          if (btn) { btn.disabled = false; btn.textContent = '启动 / 恢复'; }
        } finally {
          state.starting = false;
        }
      }

      function appendChat(role, content, toolCalls) {
        const el = document.createElement('div');
        el.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
        const tools = (toolCalls || []).map(t =>
          `<span class="tool ${t.ok ? 'ok' : 'bad'}">${esc(String(t.toolId || '').replace('agent-task-loop/', ''))}</span>`
        ).join('');
        el.innerHTML = `<div class="who">${role === 'user' ? '你' : 'Task Manager'}</div>${esc(content)}${tools ? `<div class="tools">${tools}</div>` : ''}`;
        $('chat-log').appendChild(el);
        $('chat-log').scrollTop = $('chat-log').scrollHeight;
      }

      async function sendChat(preset) {
        const input = $('chat-input');
        const message = (preset ?? input.value).trim();
        if (!message) return;
        if (!preset) input.value = '';
        appendChat('user', message);
        const thinking = document.createElement('div');
        thinking.className = 'msg bot';
        thinking.innerHTML = '<div class="who">Task Manager</div>思考中…';
        $('chat-log').appendChild(thinking);
        $('chat-log').scrollTop = $('chat-log').scrollHeight;
        try {
          const res = await api('/v1/chat', {
            method: 'POST',
            body: JSON.stringify({ message, sessionId: 'ui' }),
          });
          thinking.remove();
          appendChat('assistant', res.reply || '好的', res.toolCalls);
          await loadTasks();
          const started = (res.toolCalls || []).find(t => t.ok && String(t.toolId).includes('start'));
          const m = message.match(/\b([A-Z]+-\d+|[A-Za-z]+-\d+)\b/);
          if (m) await selectTask(m[1], { silent: true });
          else if (started) await loadTasks();
        } catch (e) {
          thinking.remove();
          appendChat('assistant', `出错了：${e.message}`);
        }
      }

      try {
        const es = new EventSource(`${baseUrl}/v1/events?token=${encodeURIComponent(token)}`);
        es.onmessage = ev => {
          try {
            const data = JSON.parse(ev.data);
            if (data.type === 'task.updated' || data.type === 'board.refresh') {
              loadTasks();
              if (data.type === 'task.updated' && data.taskId === state.selectedId && data.task) {
                renderDetail(data.task);
              }
            }
          } catch { /* ignore */ }
        };
        es.onopen = () => setLive(true, '已连接');
        es.onerror = () => setLive(false, '重连中');
      } catch {
        setLive(false, 'SSE 关闭');
      }

      $('refresh-btn').onclick = () => loadTasks();
      $('q').oninput = e => { state.query = e.target.value; renderBoard(); };
      $('filter-status').onchange = e => { state.status = e.target.value; loadTasks({ preferSelect: true }); };
      $('filter-agent').onchange = e => { state.agent = e.target.value; loadTasks({ preferSelect: true }); };
      $('view-seg').onclick = e => {
        const btn = e.target.closest('button[data-view]');
        if (!btn) return;
        state.view = btn.dataset.view;
        $('view-seg').querySelectorAll('button').forEach(b => b.classList.toggle('on', b === btn));
        renderBoard();
      };
      $('chat-send').onclick = () => sendChat();
      $('chat-input').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
      });
      $('suggest').onclick = e => {
        const b = e.target.closest('button[data-q]');
        if (b) sendChat(b.dataset.q);
      };

      const modal = $('modal');
      $('new-btn').onclick = () => {
        $('create-form').reset();
        $('create-form').taskId.value = `TASK-${Date.now().toString(36).toUpperCase()}`;
        modal.classList.add('open');
        setTimeout(() => $('create-form').title.focus(), 50);
      };
      $('modal-cancel').onclick = () => modal.classList.remove('open');
      modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });
      $('create-form').onsubmit = async e => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const body = {
          taskId: String(fd.get('taskId') || '').trim(),
          title: String(fd.get('title') || '').trim(),
          project: String(fd.get('project') || '').trim(),
          targetAgent: String(fd.get('targetAgent') || 'claude'),
          priority: Number(fd.get('priority') || 3),
          description: String(fd.get('description') || ''),
        };
        try {
          await api('/v1/tasks', { method: 'POST', body: JSON.stringify(body) });
          modal.classList.remove('open');
          toast(`已创建 ${body.taskId}`);
          await loadTasks();
          await selectTask(body.taskId);
        } catch (err) {
          toast(`创建失败：${err.message}`);
        }
      };

      document.addEventListener('keydown', e => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
          e.preventDefault();
          $('q').focus();
        }
        if (e.key === 'Escape') modal.classList.remove('open');
      });

      health();
      setInterval(health, 12000);
      loadTasks({ preferSelect: true });
    }

    function formatTime(v) {
      if (!v) return '—';
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return String(v);
      return d.toLocaleString();
    }
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
    function escAttr(s) { return esc(s).replace(/'/g, '&#39;'); }
  </script>
</body>
</html>
