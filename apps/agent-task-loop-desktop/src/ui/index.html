<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ATL Console</title>
<style>
:root{
  --bg:#0b0c0f;--panel:#12141a;--panel2:#171a22;--line:#262b36;--line2:#323846;
  --text:#eceff4;--muted:#8b93a7;--faint:#5c657a;
  --green:#3dd68c;--green2:#163528;--amber:#f0b429;--amber2:#3a2e12;
  --red:#f07178;--red2:#3a1a1d;--blue:#6cb6ff;--blue2:#152536;
  --radius:12px;--font:ui-sans-serif,system-ui,-apple-system,"PingFang SC","Segoe UI",sans-serif;
  --mono:ui-monospace,"SF Mono","JetBrains Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;border:0;background:none}
a{color:var(--blue);text-decoration:none}
.app{height:100%;display:grid;grid-template-columns:220px 1fr;grid-template-rows:52px 1fr}
.top{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 14px;border-bottom:1px solid var(--line);background:rgba(18,20,26,.92);backdrop-filter:blur(10px)}
.brand{display:flex;align-items:center;gap:10px;min-width:180px}
.logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#3dd68c,#1a9f63);display:grid;place-items:center;font-size:11px;font-weight:800;color:#04140c}
.brand b{font-size:13px;font-weight:700;letter-spacing:-.02em}
.brand span{display:block;font-size:11px;color:var(--muted)}
.search{flex:1;max-width:420px}
.search input{width:100%;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--bg);padding:0 12px;outline:0}
.search input:focus{border-color:#3f8f6b;box-shadow:0 0 0 3px rgba(61,214,140,.12)}
.top-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{height:32px;padding:0 12px;border-radius:8px;font-size:12px;font-weight:650;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--green);color:#04140c}
.btn-primary:hover{filter:brightness(1.05)}
.btn-ghost{background:var(--panel2);border-color:var(--line);color:var(--text)}
.btn-ghost:hover{border-color:var(--line2)}
.btn-amber{background:var(--amber);color:#1a1406}
.btn-amber:disabled{opacity:.45;cursor:not-allowed}
.pill{font-size:11px;font-weight:650;padding:2px 8px;border-radius:999px;border:1px solid transparent}
.p-run{background:var(--green2);color:var(--green);border-color:#245c40}
.p-wait{background:var(--blue2);color:var(--blue);border-color:#274864}
.p-todo{background:#1c1f28;color:var(--muted);border-color:var(--line)}
.p-done{background:#143028;color:#7ddea8}
.p-fail{background:var(--red2);color:var(--red);border-color:#5a2a2e}
.p-fix{background:var(--amber2);color:var(--amber);border-color:#5a4a1e}
.live{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);padding:0 8px}
.live i{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(61,214,140,.15)}
.live.down i{background:var(--red);box-shadow:none}
.side{border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-height:0}
.side-h{padding:14px 14px 8px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.nav{padding:0 8px;display:flex;flex-direction:column;gap:2px}
.nav button{text-align:left;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.nav button:hover{background:var(--panel2);color:var(--text)}
.nav button.on{background:#1a2430;color:var(--text);box-shadow:inset 3px 0 0 var(--green)}
.nav button em{font-style:normal;font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums}
.side-sec{margin-top:14px;padding:0 14px 8px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.ws{padding:0 8px 12px;display:flex;flex-direction:column;gap:4px;overflow:auto}
.ws .item{padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:var(--bg);font-size:12px}
.ws .item b{display:block;font-size:12px;margin-bottom:2px}
.ws .item span{color:var(--muted);font-size:11px}
.ws .item.active{border-color:#2f6b4f;background:#132019}
.main{min-height:0;display:grid;grid-template-columns:minmax(300px,.95fr) minmax(340px,1.15fr) minmax(300px,.9fr)}
.col{min-height:0;display:flex;flex-direction:column;border-right:1px solid var(--line);background:var(--bg)}
.col:last-child{border-right:0}
.col-h{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line)}
.col-h h2{font-size:13px;font-weight:700}
.col-h .sub{font-size:11px;color:var(--muted)}
.filters{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid var(--line)}
.filters select{flex:1;height:30px;border-radius:7px;border:1px solid var(--line);background:var(--panel);padding:0 8px;font-size:12px;color:var(--muted)}
.scroll{flex:1;min-height:0;overflow:auto}
.list{padding:8px;display:flex;flex-direction:column;gap:6px}
.card{text-align:left;width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel);transition:border-color .12s,background .12s}
.card:hover{border-color:var(--line2);background:var(--panel2)}
.card.on{border-color:#2f6b4f;background:linear-gradient(180deg,#15241c,var(--panel));box-shadow:0 0 0 1px rgba(61,214,140,.12)}
.card-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:6px}
.tid{font-family:var(--mono);font-size:11px;color:var(--amber);font-weight:650}
.title{font-size:13px;font-weight:650;line-height:1.35;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.meta{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--muted)}
.detail{padding:16px;display:flex;flex-direction:column;gap:12px}
.detail h3{font-size:22px;letter-spacing:-.03em;line-height:1.25;font-weight:750}
.kicker{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
.actions{display:flex;flex-wrap:wrap;gap:8px}
.block{border:1px solid var(--line);background:var(--panel);border-radius:10px;padding:12px}
.block h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:8px}
.block p{font-size:13px;line-height:1.55;color:#cfd6e4;white-space:pre-wrap;word-break:break-word}
.kv{display:grid;grid-template-columns:88px 1fr;gap:7px 10px;font-size:12px}
.kv dt{color:var(--muted)}.kv dd{overflow-wrap:anywhere}
.flow{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel)}
.flow div{flex:1;min-width:58px;text-align:center;font-size:10px;font-weight:650;color:var(--faint);padding:10px 4px;border-right:1px solid var(--line)}
.flow div:last-child{border-right:0}
.flow div.on{color:var(--green);background:#132019}
.flow div.done{color:#6aa88a}
.empty{height:100%;display:grid;place-items:center;text-align:center;color:var(--muted);padding:24px}
.empty strong{display:block;color:var(--text);margin-bottom:6px;font-size:15px}
.chat{display:flex;flex-direction:column;height:100%;min-height:0}
.chat-log{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:94%;padding:10px 12px;border-radius:12px;font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.msg.user{align-self:flex-end;background:#1a2a22;border:1px solid #2f6b4f}
.msg.bot{align-self:flex-start;background:var(--panel);border:1px solid var(--line)}
.msg .who{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
.mode{font-size:10px;padding:1px 6px;border-radius:999px;margin-left:6px;border:1px solid var(--line);color:var(--muted)}
.mode.model{color:var(--green);border-color:#2f6b4f}
.tools{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tool{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
.tool.ok{color:var(--green);border-color:#2f6b4f}.tool.bad{color:var(--red);border-color:#5a2a2e}
.suggest{display:flex;flex-wrap:wrap;gap:6px;padding:0 12px 8px}
.suggest button{font-size:11px;padding:5px 9px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--muted)}
.suggest button:hover{color:var(--text);border-color:var(--line2)}
.compose{border-top:1px solid var(--line);padding:10px;display:grid;gap:8px;background:rgba(12,14,18,.8)}
.compose textarea{width:100%;min-height:64px;max-height:140px;resize:vertical;border-radius:10px;border:1px solid var(--line);background:var(--panel);padding:10px;outline:0}
.compose textarea:focus{border-color:#2f6b4f;box-shadow:0 0 0 3px rgba(61,214,140,.1)}
.compose-row{display:flex;justify-content:space-between;align-items:center}
.hint{font-size:11px;color:var(--faint)}
.modal-root{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;place-items:center;z-index:40;padding:20px}
.modal-root.open{display:grid}
.modal{width:min(520px,100%);background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 24px 60px rgba(0,0,0,.45)}
.modal h3{font-size:16px;margin-bottom:12px}
.form{display:grid;gap:10px}
.form label{display:grid;gap:5px;font-size:12px;color:var(--muted)}
.form input,.form select,.form textarea{height:36px;border-radius:8px;border:1px solid var(--line);background:var(--bg);padding:0 10px;outline:0;color:var(--text)}
.form textarea{height:auto;padding:10px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.toast{position:fixed;right:16px;bottom:16px;z-index:50;display:flex;flex-direction:column;gap:8px}
.toast-item{background:#1b1f2a;border:1px solid var(--line2);color:var(--text);padding:10px 12px;border-radius:10px;font-size:12px;font-weight:650}
@media(max-width:1200px){.main{grid-template-columns:1fr 1fr}.col.chat{display:none}.app{grid-template-columns:180px 1fr}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <div class="logo">ATL</div>
      <div><b>Task Loop</b><span id="chat-mode-label">本地控制台</span></div>
    </div>
    <div class="search"><input id="q" placeholder="搜索任务…" autocomplete="off"/></div>
    <div class="top-actions">
      <button class="btn btn-ghost" id="refresh">刷新</button>
      <button class="btn btn-primary" id="new">＋ 新建</button>
      <div class="live" id="live"><i></i><span>连接中</span></div>
    </div>
  </header>

  <aside class="side">
    <div class="side-h">视图</div>
    <div class="nav" id="status-nav"></div>
    <div class="side-sec">工作区绑定</div>
    <div class="ws" id="workspace"></div>
  </aside>

  <div class="main">
    <section class="col">
      <div class="col-h"><h2>任务</h2><span class="sub" id="count">0</span></div>
      <div class="filters">
        <select id="filter-agent"><option value="">全部 Agent</option></select>
        <select id="filter-source"><option value="">全部来源</option></select>
      </div>
      <div class="scroll" id="list"></div>
    </section>
    <section class="col">
      <div class="col-h"><h2>详情</h2><span class="sub">公开字段</span></div>
      <div class="scroll" id="detail"><div class="empty"><div><strong>选择任务</strong>从左侧列表点选</div></div></div>
    </section>
    <section class="col chat">
      <div class="col-h"><h2>Agent</h2><span class="sub" id="agent-sub">rules</span></div>
      <div class="chat">
        <div class="chat-log" id="log"></div>
        <div class="suggest" id="suggest">
          <button data-q="列出任务">列出任务</button>
          <button data-q="help">能做什么</button>
        </div>
        <div class="compose">
          <textarea id="input" placeholder="用自然语言管理任务…"></textarea>
          <div class="compose-row">
            <span class="hint">Enter 发送</span>
            <button class="btn btn-primary" id="send">发送</button>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<div class="modal-root" id="modal">
  <div class="modal">
    <h3>新建任务</h3>
    <form class="form" id="form">
      <div class="form-row">
        <label>任务 ID<input name="taskId" required/></label>
        <label>优先级<select name="priority"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></label>
      </div>
      <label>标题<input name="title" required placeholder="要交付什么"/></label>
      <div class="form-row">
        <label>项目（工作区）<select name="project" id="project-select"></select></label>
        <label>Agent<select name="targetAgent" id="agent-select"></select></label>
      </div>
      <label>来源<select name="source" id="source-select"><option value="">默认</option></select></label>
      <label>描述<textarea name="description" rows="4"></textarea></label>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancel">取消</button>
        <button class="btn btn-primary" type="submit">创建</button>
      </div>
    </form>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const cfg = window.__ATL_CONFIG__ || null;
const FLOW=['待处理','进行中','执行中','待复核','修复中','待发布','待验收','已完成'];
const state={tasks:[],selectedId:null,q:'',status:'',agent:'',source:'',workspace:null,projectKey:null,starting:false};

if(!cfg?.baseUrl||!cfg?.token){
  document.getElementById('live').classList.add('down');
  document.querySelector('#live span').textContent='未配置';
} else boot(cfg.baseUrl,cfg.token);

function boot(baseUrl,token){
  const headers={Authorization:`Bearer ${token}`,'Content-Type':'application/json'};
  const api=(p,init={})=>fetch(`${baseUrl}${p}`,{...init,headers:{...headers,...(init.headers||{})}}).then(async r=>{
    const d=await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(d?.error?.message||d?.error?.code||r.statusText);
    return d;
  });
  const $=id=>document.getElementById(id);
  const toast=m=>{const e=document.createElement('div');e.className='toast-item';e.textContent=m;$('toast').appendChild(e);setTimeout(()=>e.remove(),2800)};
  const setLive=(ok,t)=>{ $('live').classList.toggle('down',!ok); $('live').querySelector('span').textContent=t; };

  async function loadWorkspace(){
    const ws=await api('/v1/workspace');
    state.workspace=ws;
    state.projectKey=ws.projects[0]?.key||null;
    const mode=ws.chatAgent?'model':'rules';
    $('agent-sub').textContent=ws.chatAgent?`model · ${ws.chatAgent.name}`:'rules（未绑定 coding agent）';
    $('chat-mode-label').textContent=ws.chatAgent?`Agent: ${ws.chatAgent.name}`:'规则模式 · 配置 agents 可启用模型';
    // workspace list
    const box=$('workspace');
    box.innerHTML='';
    if(!ws.projects.length){
      box.innerHTML='<div class="item"><b>未绑定项目</b><span>请编辑 ~/.agent-task-loop/config.json 的 projects</span></div>';
    } else {
      ws.projects.forEach(p=>{
        const el=document.createElement('button');
        el.className='item'+(p.key===state.projectKey?' active':'');
        el.innerHTML=`<b>${esc(p.name||p.key)}</b><span>${esc(p.key)} · repo ${esc(p.defaultRepository||'—')}</span>`;
        el.onclick=()=>{state.projectKey=p.key;loadWorkspace();};
        box.appendChild(el);
      });
    }
    // sources note
    if(ws.sources?.length){
      const s=document.createElement('div');
      s.className='item';
      s.innerHTML=`<b>任务来源</b><span>${esc(ws.sources.join(' · '))}</span>`;
      box.appendChild(s);
    }
    if(ws.repositories?.length){
      const r=document.createElement('div');
      r.className='item';
      r.innerHTML=`<b>仓库</b><span>${esc(ws.repositories.map(x=>x.key).join(' · '))}</span>`;
      box.appendChild(r);
    }
    // form selects
    const ps=$('project-select'); ps.innerHTML='';
    (ws.projects.length?ws.projects:[{key:'default',name:'default'}]).forEach(p=>{
      const o=document.createElement('option');o.value=p.key;o.textContent=`${p.name||p.key}`;ps.appendChild(o);
    });
    if(state.projectKey) ps.value=state.projectKey;
    const as=$('agent-select'); as.innerHTML='';
    (ws.agents.length?ws.agents:['claude','codex']).forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;as.appendChild(o);});
    const ss=$('source-select'); ss.innerHTML='<option value="">默认</option>';
    (ws.sources||[]).forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;ss.appendChild(o);});
    const fa=$('filter-agent'); fa.innerHTML='<option value="">全部 Agent</option>';
    (ws.agents||[]).forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;fa.appendChild(o);});
    const fs=$('filter-source'); fs.innerHTML='<option value="">全部来源</option>';
    (ws.sources||[]).forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fs.appendChild(o);});
  }

  function pill(status){
    if(status==='已失败')return'p-fail';
    if(status==='已完成')return'p-done';
    if(['执行中','进行中','修复中'].includes(status))return'p-run';
    if(['待复核','待决策','待发布','待验收'].includes(status))return'p-wait';
    if(status==='待处理')return'p-todo';
    return'p-fix';
  }

  function filtered(){
    const q=state.q.trim().toLowerCase();
    return state.tasks.filter(t=>{
      if(state.status && t.status!==state.status) return false;
      if(state.agent && t.targetAgent!==state.agent) return false;
      if(state.source && t.source!==state.source) return false;
      if(state.projectKey && t.project && t.project!==state.projectKey && t.project!==state.workspace?.projects?.find(p=>p.key===state.projectKey)?.name) {
        // soft filter: if project field matches key or name
        const p=state.workspace?.projects?.find(x=>x.key===state.projectKey);
        if(p && t.project!==p.key && t.project!==p.name) return true; // don't over-filter if backend uses free text
      }
      if(!q) return true;
      return [t.taskId,t.title,t.project,t.source,t.targetAgent].filter(Boolean).some(v=>String(v).toLowerCase().includes(q));
    });
  }

  function renderNav(){
    const counts={};
    state.tasks.forEach(t=>{counts[t.status]=(counts[t.status]||0)+1});
    const items=[['','全部'],...FLOW.map(s=>[s,s]),['已失败','已失败']];
    $('status-nav').innerHTML=items.map(([v,label])=>{
      const n=v? (counts[v]||0): state.tasks.length;
      return `<button data-s="${esc(v)}" class="${state.status===v?'on':''}">${esc(label)}<em>${n}</em></button>`;
    }).join('');
    $('status-nav').onclick=e=>{
      const b=e.target.closest('button[data-s]'); if(!b) return;
      state.status=b.getAttribute('data-s')||'';
      renderNav(); renderList();
    };
  }

  function renderList(){
    const items=filtered();
    $('count').textContent=items.length+' 项';
    if(!items.length){
      $('list').innerHTML='<div class="empty"><div><strong>没有任务</strong>换个筛选或新建</div></div>';
      return;
    }
    $('list').innerHTML=`<div class="list">${items.map(t=>`
      <button class="card ${t.taskId===state.selectedId?'on':''}" data-id="${esc(t.taskId)}">
        <div class="card-top"><span class="tid">${esc(t.taskId)}</span><span class="pill ${pill(t.status)}">${esc(t.status)}</span></div>
        <div class="title">${esc(t.title)}</div>
        <div class="meta"><span>${esc(t.targetAgent||'—')}</span><span>P${esc(String(t.priority??'—'))}</span><span>${esc(t.project||'—')}</span></div>
      </button>`).join('')}</div>`;
    $('list').querySelectorAll('.card').forEach(el=>el.onclick=()=>select(el.dataset.id));
  }

  async function loadTasks(prefer){
    const params=new URLSearchParams({limit:'100'});
    if(state.agent) params.set('targetAgent',state.agent);
    // status filter client-side for nav counts
    const data=await api(`/v1/tasks?${params}`);
    state.tasks=data.tasks||[];
    renderNav(); renderList();
    const ids=filtered().map(t=>t.taskId);
    if(prefer && ids[0]) await select(ids[0]);
    else if(state.selectedId && ids.includes(state.selectedId)){
      const t=state.tasks.find(x=>x.taskId===state.selectedId); if(t) renderDetail(t);
    } else if(!state.selectedId && ids[0]) await select(ids[0]);
  }

  async function select(id){
    if(!id) return;
    state.selectedId=id; renderList();
    $('detail').innerHTML='<div class="empty"><div>加载中…</div></div>';
    try{
      const d=await api(`/v1/tasks/${encodeURIComponent(id)}`);
      renderDetail(d.task);
    }catch(e){ $('detail').innerHTML=`<div class="empty"><div><strong>失败</strong>${esc(e.message)}</div></div>`; }
  }

  function renderDetail(t){
    if(!t) return;
    const idx=FLOW.indexOf(t.status);
    const flow=FLOW.map((s,i)=>`<div class="${s===t.status?'on':(idx>=0&&i<idx?'done':'')}">${esc(s)}</div>`).join('');
    $('detail').innerHTML=`
      <div class="detail">
        <div>
          <div class="kicker"><span class="tid">${esc(t.taskId)}</span><span class="pill ${pill(t.status)}">${esc(t.status)}</span><span class="sub" style="color:var(--muted)">${esc(t.targetAgent||'')} · P${esc(String(t.priority??''))}</span></div>
          <h3>${esc(t.title)}</h3>
          <div class="actions" style="margin-top:12px">
            <button class="btn btn-amber" id="start">启动 / 恢复</button>
            <button class="btn btn-ghost" id="ask">问 Agent</button>
            ${t.prLink?`<a class="btn btn-ghost" target="_blank" rel="noreferrer" href="${escAttr(t.prLink)}">打开 PR</a>`:''}
          </div>
        </div>
        <div class="flow">${flow}</div>
        <div class="block"><h4>描述</h4><p>${esc(t.description||'—')}</p></div>
        <div class="block"><h4>进度</h4><p>${esc(t.progressSummary||'—')}</p></div>
        <div class="block"><h4>结果</h4><p>${esc(t.resultSummary||'—')}</p></div>
        <div class="block"><h4>元数据</h4>
          <dl class="kv">
            <dt>项目</dt><dd>${esc(t.project||'—')}</dd>
            <dt>来源</dt><dd>${esc(t.source||'—')}</dd>
            <dt>仓库</dt><dd>${esc(t.repository||'—')}</dd>
            <dt>负责人</dt><dd>${esc(t.currentOwner||'—')}</dd>
            <dt>更新</dt><dd>${esc(t.updatedAt||'—')}</dd>
          </dl>
        </div>
      </div>`;
    $('start').onclick=()=>startTask(t.taskId);
    $('ask').onclick=()=>{ $('input').value=`查看 ${t.taskId} 并总结进度`; $('input').focus(); };
  }

  async function startTask(taskId){
    if(state.starting) return; state.starting=true;
    try{
      const r=await api(`/v1/tasks/${encodeURIComponent(taskId)}/start`,{method:'POST',body:JSON.stringify({maxRounds:5})});
      toast(`已启动 ${taskId} · ${r.runPhase||'running'}`);
      await loadTasks(); if(r.task) renderDetail(r.task);
    }catch(e){ toast(`启动失败：${e.message}`); }
    finally{ state.starting=false; }
  }

  function append(role, content, toolCalls, mode){
    const el=document.createElement('div');
    el.className=`msg ${role==='user'?'user':'bot'}`;
    const tools=(toolCalls||[]).map(t=>`<span class="tool ${t.ok?'ok':'bad'}">${esc(String(t.toolId||'').replace('agent-task-loop/',''))}</span>`).join('');
    const modeTag=mode?`<span class="mode ${mode}">${mode}</span>`:'';
    el.innerHTML=`<div class="who">${role==='user'?'你':'Agent'}${modeTag}</div>${esc(content)}${tools?`<div class="tools">${tools}</div>`:''}`;
    $('log').appendChild(el); $('log').scrollTop=$('log').scrollHeight;
  }

  async function send(preset){
    const message=(preset??$('input').value).trim(); if(!message) return;
    if(!preset) $('input').value='';
    append('user', message);
    const thinking=document.createElement('div'); thinking.className='msg bot'; thinking.innerHTML='<div class="who">Agent</div>处理中…';
    $('log').appendChild(thinking); $('log').scrollTop=$('log').scrollHeight;
    try{
      const r=await api('/v1/chat',{method:'POST',body:JSON.stringify({message,sessionId:'ui'})});
      thinking.remove();
      append('assistant', r.reply||'好的', r.toolCalls, r.mode);
      await loadTasks();
      const m=message.match(/\b([A-Z][A-Z0-9]*-\w+)\b/);
      if(m) await select(m[1]);
    }catch(e){ thinking.remove(); append('assistant', `出错：${e.message}`); }
  }

  // SSE
  try{
    const es=new EventSource(`${baseUrl}/v1/events?token=${encodeURIComponent(token)}`);
    es.onmessage=ev=>{ try{ const d=JSON.parse(ev.data); if(d.type==='task.updated'||d.type==='board.refresh'){ loadTasks(); if(d.task&&d.taskId===state.selectedId) renderDetail(d.task);} }catch{} };
    es.onopen=()=>setLive(true,'已连接'); es.onerror=()=>setLive(false,'重连中');
  }catch{ setLive(false,'SSE 关'); }

  $('refresh').onclick=()=>loadTasks();
  $('q').oninput=e=>{state.q=e.target.value; renderList();};
  $('filter-agent').onchange=e=>{state.agent=e.target.value; renderList();};
  $('filter-source').onchange=e=>{state.source=e.target.value; renderList();};
  $('send').onclick=()=>send();
  $('input').onkeydown=e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } };
  $('suggest').onclick=e=>{ const b=e.target.closest('button[data-q]'); if(b) send(b.dataset.q); };
  $('new').onclick=()=>{
    $('form').reset();
    $('form').taskId.value=`TASK-${Date.now().toString(36).toUpperCase()}`;
    if(state.projectKey) $('project-select').value=state.projectKey;
    $('modal').classList.add('open');
  };
  $('cancel').onclick=()=>$('modal').classList.remove('open');
  $('modal').onclick=e=>{ if(e.target===$('modal')) $('modal').classList.remove('open'); };
  $('form').onsubmit=async e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    const body={
      taskId:String(fd.get('taskId')||'').trim(),
      title:String(fd.get('title')||'').trim(),
      project:String(fd.get('project')||state.projectKey||'default').trim(),
      targetAgent:String(fd.get('targetAgent')||'claude'),
      priority:Number(fd.get('priority')||3),
      description:String(fd.get('description')||''),
    };
    const source=String(fd.get('source')||'');
    if(source) body.source=source;
    try{
      await api('/v1/tasks',{method:'POST',body:JSON.stringify(body)});
      $('modal').classList.remove('open'); toast('已创建 '+body.taskId);
      await loadTasks(); await select(body.taskId);
    }catch(err){ toast('创建失败：'+err.message); }
  };

  append('assistant', '本地 Task Manager。左侧绑定 config 中的 projects/sources；对话在配置了 coding agent 时走模型规划，否则用规则。');
  api('/v1/health').then(()=>setLive(true,'已连接')).catch(()=>setLive(false,'离线'));
  loadWorkspace().then(()=>loadTasks(true)).catch(e=>toast('工作区加载失败：'+e.message));
}

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escAttr(s){return esc(s).replace(/'/g,'&#39;')}
</script>
</body>
</html>
